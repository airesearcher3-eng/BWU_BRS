services:

  # -- Frontend � Vue 3 SPA served by Nginx --------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # -- Backend � FastAPI + asyncpg ? Supabase ------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL:        ${DATABASE_URL}
      ML_SERVICE_URL:      http://ml:8001
      SECRET_KEY:          ${SECRET_KEY}
      JWT_SECRET:          ${SECRET_KEY}
      JWT_ALGORITHM:       HS256
      JWT_EXPIRY_HOURS:    8
      LOG_LEVEL:           ${LOG_LEVEL:-INFO}
      UPLOAD_FOLDER:       uploads
      MAX_UPLOAD_BYTES:    ${MAX_UPLOAD_BYTES:-31457280}
    volumes:
      - brs_uploads:/app/uploads
      - brs_output:/app/output
      - brs_logs:/app/logs
    depends_on:
      - ml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/readyz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -- ML Service � OpenAI Hybrid RAG -------------------------------------
  ml:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL:   ${DATABASE_URL}
      LOG_LEVEL:      ${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  brs_uploads:
  brs_output:
  brs_logs:
