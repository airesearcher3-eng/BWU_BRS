name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ENV: development
      SECRET_KEY: ci-secret-key-not-for-production
      JWT_SECRET: ci-jwt-secret-not-for-production
      CORS_ORIGINS: http://testserver

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        # Skip tests that depend on the un-committed bank workbook fixture.
        run: pytest -q --ignore=tests/test_api_reports.py

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: brs-system:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
